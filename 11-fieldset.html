❓ Question 11: Fieldset & Legend

👉 Create a form that includes:

A heading: "User Information"
Use <fieldset> and <legend>
Inside it:
Name (text)
Email (email)
Submit button
<html>
    <head>
        <title>Contact Info</title>
    </head>
    <body>
        <h2>Contact Information </h2>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <label>Name</label>
                <input type="text">
                <br>
                <label>Email</label>
                <input type="email">
                <br>
            </fieldset>
        </form>
    </body>
</html>
