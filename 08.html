❓ Question 9: Dropdown & Checkbox

👉 Create a form that includes:

A heading: "Course Selection Form"
A dropdown (select) with options:
C
Java
Python
Checkboxes for skills:
HTML
CSS
JavaScript
A submit button
<!DOCTYPE html>
<html>
    <title>
        Course Selection
    </title>
    <body>
        <h3>Couse Selection</h3>
        <select>
            <option>C</option>
            <option>C++</option>
            <option>JAVA</option>
        </select>
        <p>
            <input type="checkbox">
            <label>HTML</label>
             <input type="checkbox">
            <label>CSS</label>
             <input type="checkbox">
            <label>JS</label>
        </p>
        <p>
            <button type="submit" >Submit</button>
        </p>
    </body>
</html>
