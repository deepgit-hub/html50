<html>
    <head>
        <title>Text Formatting</title>
    </head>
    <body>
        <h1>Text Formatting in HTML</h1>
        <p><b>This is Bold Text</b></p>
        <p><i>This is Italic Text</i></p>
        <p><u>This is Underline text</u></p>
        <h4>Subscript : H<sub>2</sub>O</h4>
        <h4>Superscript : x<sup>2</sup></h4>

    </body>
</html>
