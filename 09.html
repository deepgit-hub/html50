❓ Question 9: Input Types

👉 Create a form that includes:

Name (text)
Email (email)
Age (number)
Date of Birth (date)
Upload File (file input)
Submit button
<html>
    <head>
        <title>Input Types</title>
    </head>
    <body>
        <h3>Basic Data input</h3>
        <form>
        <p>
            <label>Name:</label>
            <input type="text">
        </p>
        <p>
            <label>Date of Birth:</label>
            <input type="date">
        </p>
        <p>
            <label>Email</label>
            <input type="email">
        </p>
        <p>
            <label>Age</label>
            <input type="number">
        </p>
        <p>
            <label>Upload file</label>
            <input type="file">
        </p>
        <button type="submit" >Submit</button>
        </form>
    </body>
</html>
